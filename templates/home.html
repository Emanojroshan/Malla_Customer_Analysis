<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mall Customer Segmentation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 480px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    h1 { font-size: 1.8rem; margin-bottom: 8px; }
    p.sub { font-size: 0.95rem; color: #aaa; margin-bottom: 32px; }
    label { display: block; text-align: left; font-size: 0.85rem; color: #ccc; margin-bottom: 6px; }
    input[type=number] {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1rem;
      margin-bottom: 20px;
      outline: none;
      transition: border 0.2s;
    }
    input[type=number]:focus { border-color: #e94560; }
    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #e94560, #0f3460);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }
    button:hover { transform: translateY(-2px); opacity: 0.9; }
    #result-box {
      margin-top: 28px;
      padding: 20px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      display: none;
      text-align: left;
    }
    #result-box h3 { font-size: 1.1rem; color: #e94560; margin-bottom: 6px; }
    #result-box p { font-size: 0.9rem; color: #ccc; line-height: 1.6; }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      background: #e94560;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🛍️ Customer Segmentation</h1>
    <p class="sub">Enter customer details to find their shopping segment</p>

    <label for="income">Annual Income (k$)</label>
    <input type="number" id="income" placeholder="e.g. 60" min="0" max="200"/>

    <label for="score">Spending Score (1–100)</label>
    <input type="number" id="score" placeholder="e.g. 75" min="1" max="100"/>

    <button onclick="classify()">🔍 Predict Segment</button>

    <div id="result-box">
      <span class="badge" id="cluster-badge"></span>
      <h3 id="segment-label"></h3>
      <p id="segment-desc"></p>
    </div>
  </div>

  <script>
    async function classify() {
      const income = parseFloat(document.getElementById('income').value);
      const score = parseFloat(document.getElementById('score').value);
      if (!income || !score) { alert("Please fill in both fields."); return; }

      const res = await fetch('/classify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ annual_income: income, spending_score: score })
      });
      const data = await res.json();

      document.getElementById('cluster-badge').textContent = `Cluster ${data.cluster}`;
      document.getElementById('segment-label').textContent = data.label;
      document.getElementById('segment-desc').textContent = data.description;
      document.getElementById('result-box').style.display = 'block';
    }
  </script>
</body>
</html>
